name: sfr

x-base: &base
  image: sfr-dev:local
  build:
    context: .
    dockerfile: Dockerfile
    args:
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
  volumes:
    - ../:/work
    - sfr-ccache:/ccache
  working_dir: /work
  environment:
    - CCACHE_DIR=/ccache

services:
  dev:
    <<: *base
    tty: true
    stdin_open: true
    command: ["bash"]

  firmware:
    <<: *base
    command: ["bash", "-lc", "scripts/_build-pico-inner.sh"]

  flash:
    <<: *base
    user: "0"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: ["bash", "-lc", "scripts/_flash-inner.sh ${ELF:-firmware/build/firmware.elf}"]

  test-unit:
    <<: *base
    # Verilator + cocotb のユニット検証。Pico SDK / USB は使わない。
    # 名前付きボリュームの初期 owner が root なので test-hil と同じく root 実行。
    user: "0"
    volumes:
      - ../:/work
      - sfr-ccache:/ccache
      - sfr-unit-venv:/opt/unit-venv
    environment:
      - CCACHE_DIR=/ccache
      - PIP_CACHE_DIR=/ccache/pip
    entrypoint: ["scripts/_test-unit-inner.sh"]
    command: []

volumes:
  sfr-ccache:
  sfr-unit-venv:
